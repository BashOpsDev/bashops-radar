name: BashOps Radar Test

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run BashOps Radar
        id: radar
        uses: ./github-action
        with:
          repo_url: https://github.com/sourcebot-dev/sourcebot
          comment: false

      - name: Show Outputs
        run: |
          echo "Opportunity Score: ${{ steps.radar.outputs.opportunity_score }}"
          echo "Estimated Contract Potential: ${{ steps.radar.outputs.contract_potential }}"
          echo "Recommended Next Action: ${{ steps.radar.outputs.recommended_next_action }}"
