<div class="product-switcher" role="group" aria-label="BashOps products">
    <a
        class="product-switcher-link{% if current_product == 'radar' %} current{% endif %}"
        href="/{% if current_product == 'maintainer' %}?source=maintainer{% endif %}"
        {% if current_product == "radar" %}aria-current="page"{% endif %}
    >
        <span>BashOps Radar</span>
        {% if current_product == "radar" %}<small>Current</small>{% endif %}
    </a>
    {% if maintainer_enabled %}
    <a
        class="product-switcher-link{% if current_product == 'maintainer' %} current{% endif %}"
        href="/maintainer{% if current_product == 'radar' %}?source=radar{% endif %}"
        {% if current_product == "maintainer" %}aria-current="page"{% endif %}
    >
        <span>BashOps Maintainer</span>
        {% if current_product == "maintainer" %}<small>Current</small>{% endif %}
    </a>
    {% endif %}
</div>
