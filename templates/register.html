<!DOCTYPE html>
<html>
<head>
    <title>Register - BashOps Radar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
{% include "components/navbar.html" %}

<main>
    <section class="card">
        <span class="section-label">Create Account</span>
        <h1>Join BashOps Radar</h1>
        <p class="angle">Create your workspace and start tracking proof-of-work opportunities.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
            <input type="text" name="name" placeholder="Your name" required>
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <p class="angle">
            Already have an account? <a href="/login" class="secondary-link">Login</a>
        </p>
    </section>
</main>
</body>
</html>
